<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Semester 2 | BITS Pilani M.Tech</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111827;
        margin: 0;
      }

      .page {
        max-width: 960px;
        margin: 32px auto 24px;
        padding: 0 16px 32px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0 20px;
        border-bottom: 1px solid #e5e7eb;
        margin-bottom: 20px;
      }

      .header-logo {
        width: 64px;
        height: auto;
      }

      .header-text-primary {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #6b7280;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .header-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      .header-subtitle {
        font-size: 13px;
        color: #6b7280;
      }

      .card {
        border-radius: 8px;
        padding: 18px 20px 16px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
      }

      .card-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .card-text {
        font-size: 13px;
        color: #4b5563;
        margin-bottom: 16px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        border: 1px solid transparent;
        cursor: pointer;
      }

      .btn-primary {
        background: #1d4ed8;
        color: #ffffff;
      }

      .btn-primary:hover {
        background: #1e40af;
      }

      .btn-secondary {
        background: #ffffff;
        color: #374151;
        border-color: #d1d5db;
      }

      .btn-secondary:hover {
        background: #f3f4f6;
      }

      .btn span.icon {
        margin-left: 6px;
        font-size: 15px;
      }

      .footer {
        margin-top: 16px;
        font-size: 11px;
        color: #9ca3af;
        text-align: right;
      }

      @media (max-width: 600px) {
        .page {
          margin: 16px auto 20px;
        }

        .header {
          padding: 12px 0 16px;
        }

        .header-logo {
          width: 52px;
        }

        .header-title {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <img src="images.png" alt="BITS Pilani" class="header-logo" />
        <div>
          <div class="header-text-primary">BITS PILANI</div>
          <div class="header-title">M.Tech Programme – Semester 2</div>
          <div class="header-subtitle">
            Official semester document download.
          </div>
        </div>
      </header>

      <section class="card">
        <div class="card-title">Semester 2 PDF</div>
        <div class="card-text">
          Click the button below to download the Semester 2 PDF document.
        </div>
        <div class="actions">
          <a href="pdfs/semester2.pdf" download class="btn btn-primary">
            Download PDF
            <span class="icon">↓</span>
          </a>
          <a href="index.html" class="btn btn-secondary">
            Back to all semesters
          </a>
        </div>
        <div class="footer">For academic use only.</div>
      </section>
    </main>
  </body>
</html>
