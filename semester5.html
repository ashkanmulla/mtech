<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Semester 5 | BITS Pilani M.Tech</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #111827;
        margin: 0;
      }

      .page {
        max-width: 960px;
        margin: 32px auto 24px;
        padding: 0 16px 32px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0 20px;
        border-bottom: 1px solid #e5e7eb;
        margin-bottom: 20px;
      }

      .header-logo {
        width: 88px;
        height: auto;
      }

      .header-text-primary {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #6b7280;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .header-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      .header-subtitle {
        font-size: 13px;
        color: #6b7280;
      }

      .card {
        border-radius: 8px;
        padding: 18px 20px 16px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
      }

      .card-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .card-text {
        font-size: 13px;
        color: #4b5563;
        margin-bottom: 16px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px 16px;
        margin-bottom: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .label {
        font-size: 12px;
        font-weight: 500;
        color: #374151;
      }

      .input {
        border-radius: 6px;
        border: 1px solid #d1d5db;
        padding: 7px 10px;
        font-size: 14px;
      }

      .input:focus {
        outline: none;
        border-color: #1d4ed8;
        box-shadow: 0 0 0 1px #1d4ed8;
      }

      .hint {
        font-size: 11px;
        color: #6b7280;
      }

      .error {
        margin-top: 4px;
        font-size: 11px;
        color: #b91c1c;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        border: 1px solid transparent;
        cursor: pointer;
      }

      .btn-primary {
        background: #1d4ed8;
        color: #ffffff;
      }

      .btn-primary:hover {
        background: #1e40af;
      }

      .btn-secondary {
        background: #ffffff;
        color: #374151;
        border-color: #d1d5db;
      }

      .btn-secondary:hover {
        background: #f3f4f6;
      }

      .btn span.icon {
        margin-left: 6px;
        font-size: 15px;
      }

      .footer {
        margin-top: 16px;
        font-size: 11px;
        color: #9ca3af;
        text-align: right;
      }

      @media (max-width: 600px) {
        .page {
          margin: 16px auto 20px;
        }

        .header {
          padding: 12px 0 16px;
        }

        .header-logo {
          width: 52px;
        }

        .header-title {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <img src="images.png" alt="BITS Pilani" class="header-logo" />
        <div>
          <div class="header-text-primary">BITS PILANI</div>
          <div class="header-title">M.Tech Programme – Semester 5</div>
          <div class="header-subtitle">
            Official semester document download.
          </div>
        </div>
      </header>

      <section class="card">
        <div class="card-title">Semester 5 PDF</div>
        <div class="card-text">
          Enter your roll number and date of birth to access the Semester 5 PDF
          document.
        </div>
        <form id="access-form-sem5">
          <div class="form-grid">
            <div class="field">
              <label for="roll-sem5" class="label">Roll number</label>
              <input
                id="roll-sem5"
                name="roll"
                class="input"
                autocomplete="off"
                required
              />
              <div class="hint">Example: 2024MT057</div>
            </div>
            <div class="field">
              <label for="dob-sem5" class="label">Date of birth</label>
              <input
                id="dob-sem5"
                name="dob"
                type="date"
                class="input"
                required
              />
              <div class="hint">Format: DD/MM/YYYY</div>
            </div>
          </div>
          <div id="error-sem5" class="error" aria-live="polite"></div>
          <div class="actions">
            <button type="submit" class="btn btn-primary">
              Continue &amp; download
              <span class="icon">↓</span>
            </button>
            <a href="index.html" class="btn btn-secondary">
              Back to all semesters
            </a>
          </div>
        </form>
        <div class="footer">For academic use only.</div>
      </section>
    </main>
    <script>
      (function () {
        const form = document.getElementById("access-form-sem5");
        const rollInput = document.getElementById("roll-sem5");
        const dobInput = document.getElementById("dob-sem5");
        const errorEl = document.getElementById("error-sem5");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          errorEl.textContent = "";

          const roll = rollInput.value.trim();
          const dob = dobInput.value.trim();

          if (!roll || !dob) {
            errorEl.textContent = "Please enter both roll number and date of birth.";
            return;
          }

          window.location.href = "pdfs/semester5.pdf";
        });
      })();
    </script>
  </body>
</html>
